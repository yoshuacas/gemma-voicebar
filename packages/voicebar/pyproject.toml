[project]
name = "gemma-voicebar"
version = "0.1.0"
description = "Self-contained menu-bar dictation app (Whisper ASR + Kokoro TTS)"
requires-python = ">=3.12"
dependencies = [
    "rumps>=0.4",
    "pynput>=1.7",
    "sounddevice>=0.4",
    "soundfile>=0.13.1",
    "scipy>=1.11",
    "numpy>=1.26",
    "mlx-whisper>=0.4.0",
    "kokoro>=0.9",
    "pyobjc-framework-cocoa>=12",
    "pyobjc-framework-quartz>=12",
]

[project.scripts]
gemma-voice-bar = "voicebar.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/voicebar"]
