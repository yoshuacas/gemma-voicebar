site_name: gemma-voicebar
site_description: Local, accurate voice dictation for macOS — Whisper ASR + Kokoro TTS in a single menu-bar app
site_url: https://yoshuacas.github.io/gemma-voicebar/
repo_url: https://github.com/yoshuacas/gemma-voicebar
repo_name: yoshuacas/gemma-voicebar

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.footer
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences
  - pymdownx.highlight
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Tutorial:
      - Getting started: tutorials/getting-started.md
  - Guides:
      - Overview: guide/index.md
      - Fix hotkeys that do nothing: guide/fix-permissions.md
      - Tune or disable live typing: guide/live-typing.md
      - Change the speaking voice: guide/change-voice.md
      - Start at login: guide/start-at-login.md
      - Diagnose slow transcription: guide/diagnose-slow-asr.md
  - Reference: reference/index.md
  - How it works: explanation/architecture.md
